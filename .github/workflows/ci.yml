name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: hooks (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # Zero dependencies: nothing to install, just run the built-in test runner.
      - run: node --test
